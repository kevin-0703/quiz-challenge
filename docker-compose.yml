services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: https://quiz.api.autoconnectrwanda.xyz/api
    container_name: quiz_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
  backend:
    build:
      context: ./backend1
      dockerfile: Dockerfile
    container_name: quiz_backend
    command: python manage.py runserver 0.0.0.0:8001
    volumes:
      - ./backend1:/app
    ports:
      - "8001:8001"
    env_file:
      - ./backend1/.env
    depends_on:
      - db
    working_dir: /app
  db:
    image: postgres:15
    container_name: quiz_postgres
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-quiz_db}
      POSTGRES_USER: ${DB_USER:-quiz_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-quiz_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
volumes:
  postgres_data:
